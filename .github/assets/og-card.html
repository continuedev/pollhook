<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=IBM+Plex+Sans:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 640px;
    background: hsl(0 0% 95.3%);
    font-family: 'IBM Plex Sans', sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 100px;
    position: relative;
    overflow: hidden;
  }

  .ambient {
    position: absolute;
    top: -80px;
    right: -120px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle at center,
      rgba(100, 120, 255, 0.12) 0%,
      rgba(180, 100, 255, 0.08) 40%,
      transparent 70%
    );
    filter: blur(40px);
    pointer-events: none;
  }

  .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: rgba(0, 0, 0, 0.3);
    margin-bottom: 20px;
  }

  .title {
    font-size: 80px;
    font-weight: 300;
    letter-spacing: -2px;
    color: rgba(0, 0, 0, 0.88);
    line-height: 1;
    margin-bottom: 16px;
  }

  .tagline {
    font-size: 24px;
    font-weight: 400;
    color: rgba(0, 0, 0, 0.4);
    margin-bottom: 48px;
  }

  .install-pill {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    font-weight: 400;
    color: rgba(0, 0, 0, 0.55);
    background: rgba(0, 0, 0, 0.04);
    border: 1px solid rgba(0, 0, 0, 0.06);
    border-radius: 8px;
    padding: 12px 24px;
  }

  .footer {
    position: absolute;
    bottom: 40px;
    left: 100px;
    right: 100px;
    border-top: 1px solid rgba(0, 0, 0, 0.06);
    padding-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-logo {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    font-weight: 400;
    color: rgba(0, 0, 0, 0.25);
  }

  .footer-url {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: rgba(0, 0, 0, 0.25);
  }
</style>
</head>
<body>
  <div class="ambient"></div>
  <div class="label">Continue</div>
  <div class="title">pollhook</div>
  <div class="tagline">Poll REST APIs, deliver webhooks</div>
  <div class="install-pill">go install github.com/continuedev/pollhook@latest</div>
  <div class="footer">
    <div class="footer-logo">Continue</div>
    <div class="footer-url">continue.dev</div>
  </div>
</body>
</html>
